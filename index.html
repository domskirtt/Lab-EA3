<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Expense Tracker</title>
  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #dbeafe;
      --card: rgba(255, 255, 255, 0.72);
      --card-solid: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --accent: #7c3aed;
      --danger: #ef4444;
      --danger-dark: #dc2626;
      --success: #10b981;
      --warning: #f59e0b;
      --border: rgba(255, 255, 255, 0.45);
      --shadow: 0 20px 40px rgba(37, 99, 235, 0.12);
      --radius: 22px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      padding: 32px;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(37, 99, 235, 0.14), transparent 30%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .container {
      max-width: 1080px;
      margin: auto;
      border-radius: 28px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.45);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255, 255, 255, 0.5);
      box-shadow: var(--shadow);
    }

    .header {
      position: relative;
      padding: 36px 28px;
      color: white;
      text-align: center;
      background: linear-gradient(135deg, #2563eb, #7c3aed);
    }

    .header::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(to right, rgba(255,255,255,0.08), transparent, rgba(255,255,255,0.08));
      pointer-events: none;
    }

    .header h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .header p {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.9);
    }

    .content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 28px;
    }

    .card {
      background: var(--card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: 0 10px 25px rgba(15, 23, 42, 0.06);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(15, 23, 42, 0.08);
    }

    .card h2 {
      font-size: 1.15rem;
      margin-bottom: 18px;
      color: var(--text);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    label {
      display: block;
      margin: 14px 0 8px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #334155;
    }

    input,
    select,
    button {
      width: 100%;
      border: none;
      border-radius: 14px;
      font-size: 1rem;
    }

    input,
    select {
      padding: 14px 16px;
      background: rgba(255, 255, 255, 0.92);
      border: 1px solid #dbe3f0;
      color: var(--text);
      transition: all 0.2s ease;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      transform: translateY(-1px);
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      margin-top: 18px;
      padding: 14px 18px;
      cursor: pointer;
      font-weight: 700;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      box-shadow: 0 10px 18px rgba(37, 99, 235, 0.24);
      transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 22px rgba(37, 99, 235, 0.28);
    }

    button:active {
      transform: translateY(0);
    }

    .summary {
      display: grid;
      gap: 16px;
    }

    .summary-box {
      background: rgba(255, 255, 255, 0.9);
      border: 1px solid #e2e8f0;
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      position: relative;
      overflow: hidden;
    }

    .summary-box::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
    }

    .summary-box h3 {
      font-size: 0.9rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .summary-box p {
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--text);
    }

    .expense-list {
      grid-column: 1 / -1;
    }

    .expense-list h2 {
      margin-bottom: 18px;
    }

    .expense-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      padding: 16px 18px;
      margin-bottom: 12px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid #e2e8f0;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.05);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .expense-item:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(15, 23, 42, 0.08);
    }

    .expense-info {
      flex: 1;
      min-width: 180px;
    }

    .expense-info strong {
      display: block;
      font-size: 1rem;
      margin-bottom: 4px;
      color: var(--text);
    }

    .expense-info span {
      display: inline-block;
      font-size: 0.88rem;
      color: var(--muted);
      background: #eff6ff;
      padding: 6px 10px;
      border-radius: 999px;
    }

    .expense-amount {
      font-size: 1.05rem;
      font-weight: 800;
      color: var(--danger-dark);
      min-width: 100px;
      text-align: right;
    }

    .delete-btn {
      width: auto;
      margin-top: 0;
      padding: 10px 14px;
      background: linear-gradient(135deg, var(--danger), var(--danger-dark));
      box-shadow: 0 8px 16px rgba(239, 68, 68, 0.2);
    }

    .delete-btn:hover {
      box-shadow: 0 12px 20px rgba(239, 68, 68, 0.28);
    }

    .warning {
      margin-top: 10px;
      font-size: 0.92rem;
      font-weight: 700;
    }

    .warning.danger {
      color: var(--danger-dark);
    }

    .warning.caution {
      color: #b45309;
    }

    .empty-state {
      text-align: center;
      padding: 26px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.75);
      color: var(--muted);
      border: 1px dashed #cbd5e1;
    }

    @media (max-width: 768px) {
      body {
        padding: 18px;
      }

      .content {
        grid-template-columns: 1fr;
        padding: 18px;
      }

      .header {
        padding: 28px 20px;
      }

      .header h1 {
        font-size: 1.6rem;
      }

      .summary-box p {
        font-size: 1.5rem;
      }

      .expense-amount {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Smart Daily Expense Tracker</h1>
      <p>Track your spending and stay within budget</p>
    </div>

    <div class="content">
      <div class="card">
        <h2>Set Budget</h2>
        <label for="budget">Monthly Budget</label>
        <input type="number" id="budget" placeholder="Enter your budget" />
        <button onclick="setBudget()">Save Budget</button>
      </div>

      <div class="card">
        <h2>Add Expense</h2>
        <label for="title">Expense Title</label>
        <input type="text" id="title" placeholder="e.g. Grocery" />

        <label for="amount">Amount</label>
        <input type="number" id="amount" placeholder="e.g. 250" />

        <label for="category">Category</label>
        <select id="category">
          <option value="Food">Food</option>
          <option value="Transport">Transport</option>
          <option value="Bills">Bills</option>
          <option value="Shopping">Shopping</option>
          <option value="Other">Other</option>
        </select>

        <button onclick="addExpense()">Add Expense</button>
      </div>

      <div class="card summary">
        <div class="summary-box">
          <h3>Total Budget</h3>
          <p id="totalBudget">₱0.00</p>
        </div>
        <div class="summary-box">
          <h3>Total Spent</h3>
          <p id="totalSpent">₱0.00</p>
        </div>
        <div class="summary-box">
          <h3>Remaining Budget</h3>
          <p id="remainingBudget">₱0.00</p>
          <div id="warningMessage" class="warning"></div>
        </div>
      </div>

      <div class="card expense-list">
        <h2>Expense History</h2>
        <div id="expenseList"></div>
      </div>
    </div>
  </div>

  <script>
    let budget = localStorage.getItem("budget") ? parseFloat(localStorage.getItem("budget")) : 0;
    let expenses = localStorage.getItem("expenses") ? JSON.parse(localStorage.getItem("expenses")) : [];

    function saveData() {
      localStorage.setItem("budget", budget);
      localStorage.setItem("expenses", JSON.stringify(expenses));
    }

    function setBudget() {
      const budgetInput = document.getElementById("budget");
      const value = parseFloat(budgetInput.value);

      if (isNaN(value) || value <= 0) {
        alert("Please enter a valid budget amount.");
        return;
      }

      budget = value;
      budgetInput.value = "";
      saveData();
      render();
    }

    function addExpense() {
      const title = document.getElementById("title").value.trim();
      const amount = parseFloat(document.getElementById("amount").value);
      const category = document.getElementById("category").value;

      if (!title || isNaN(amount) || amount <= 0) {
        alert("Please enter valid expense details.");
        return;
      }

      expenses.push({
        id: Date.now(),
        title,
        amount,
        category
      });

      document.getElementById("title").value = "";
      document.getElementById("amount").value = "";
      document.getElementById("category").value = "Food";

      saveData();
      render();
    }

    function deleteExpense(id) {
      expenses = expenses.filter(expense => expense.id !== id);
      saveData();
      render();
    }

    function render() {
      const totalSpent = expenses.reduce((sum, expense) => sum + expense.amount, 0);
      const remaining = budget - totalSpent;

      document.getElementById("totalBudget").textContent = `₱${budget.toFixed(2)}`;
      document.getElementById("totalSpent").textContent = `₱${totalSpent.toFixed(2)}`;
      document.getElementById("remainingBudget").textContent = `₱${remaining.toFixed(2)}`;

      const warningMessage = document.getElementById("warningMessage");
      warningMessage.className = "warning";

      if (remaining < 0) {
        warningMessage.textContent = "Warning: You have exceeded your budget!";
        warningMessage.classList.add("danger");
      } else if (remaining < budget * 0.2 && budget > 0) {
        warningMessage.textContent = "Caution: You are close to your budget limit.";
        warningMessage.classList.add("caution");
      } else {
        warningMessage.textContent = "";
      }

      const expenseList = document.getElementById("expenseList");
      expenseList.innerHTML = "";

      if (expenses.length === 0) {
        expenseList.innerHTML = `<div class="empty-state">No expenses added yet.</div>`;
        return;
      }

      expenses.forEach(expense => {
        const item = document.createElement("div");
        item.className = "expense-item";

        item.innerHTML = `
          <div class="expense-info">
            <strong>${expense.title}</strong>
            <span>${expense.category}</span>
          </div>
          <div class="expense-amount">₱${expense.amount.toFixed(2)}</div>
          <button class="delete-btn" onclick="deleteExpense(${expense.id})">Delete</button>
        `;

        expenseList.appendChild(item);
      });
    }

    render();
  </script>
</body>
</html>
